<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY PLAYLIST - Podcast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #fde8e0 0%, #e8dff5 100%);
    min-height: 100vh;
    max-width: 400px;
    margin: 0 auto;
    padding: 12px 16px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .header .close { color: #999; font-size: 14px; }
  .header .title { text-align: center; }
  .header .title h1 { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
  .header .title span { font-size: 11px; color: #999; }
  .header .dots {
    width: 32px; height: 32px; border-radius: 50%;
    background: #eee; display: flex; align-items: center; justify-content: center;
  }
  .header .dots::after { content: '⋮'; font-size: 18px; }

  /* Podcast Banner */
  .podcast-banner {
    background: linear-gradient(135deg, #2d2d2d 0%, #1a1a2e 100%);
    border-radius: 20px;
    padding: 24px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .podcast-banner::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .podcast-banner img {
    width: 80px; height: 80px;
    border-radius: 16px;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.2);
  }
  .podcast-info h2 {
    color: #fff;
    font-size: 22px;  /* KATTAROQ QILINDI */
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .podcast-info p {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
  }

  /* Stats Cards — YASHIL va SARIQ */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    flex: 1;
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-card .icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .stat-card .info .number {
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-card .info .label {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.8;
    margin-top: 2px;
  }

  /* YASHIL CARD — Videolar soni */
  .stat-card.green {
    background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    color: #fff;
  }
  .stat-card.green .icon {
    background: rgba(255,255,255,0.25);
  }

  /* SARIQ CARD — Obunachilar soni */
  .stat-card.yellow {
    background: linear-gradient(135deg, #ffc107 0%, #ffcd38 100%);
    color: #333;
  }
  .stat-card.yellow .icon {
    background: rgba(0,0,0,0.1);
  }

  /* Channel List */
  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .section-title .mic {
    width: 28px; height: 28px;
    background: #333;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #ffc107;
    font-size: 16px;
  }
  .section-title h3 { font-size: 16px; font-weight: 700; }

  .channel-card {
    background: #fff;
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .channel-card .avatar {
    width: 48px; height: 48px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .channel-card .details { flex: 1; }
  .channel-card .details .name {
    font-size: 15px;
    font-weight: 700;
    color: #222;
  }
  .channel-card .details .count {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
  .channel-card .arrow {
    width: 32px; height: 32px;
    background: #f0f0f0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #999;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 368px;
    background: #fff;
    border-radius: 20px;
    padding: 10px 0;
    display: flex;
    justify-content: space-around;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .nav-item {
    text-align: center;
    font-size: 10px;
    color: #999;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
  }
  .nav-item.active { color: #e53935; }
  .nav-item .nav-icon { font-size: 20px; margin-bottom: 2px; }
</style>
</head>
<body>
